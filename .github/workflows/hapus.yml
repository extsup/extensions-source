name: Cleanup Foreign Language Extensions

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove all language folders
        run: |
          cd src
          
          # Hapus semua folder
          for dir in */; do
            lang="${dir%/}"
            echo "Menghapus: $lang"
            rm -rf "$lang"
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: remove all language extensions"
          git push